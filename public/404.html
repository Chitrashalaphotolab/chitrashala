<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect to index with path encoded as query param
      const path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/?p=' + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
